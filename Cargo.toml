[package]
name = "bloom-wiki"
version = "0.1.0"
edition = "2024"

[dependencies]
tree-sitter-wikitext = { git = "https://github.com/santhoshtr/tree-sitter-wikitext", rev = "e19cf16" }
bloomfilter = "3.0.1"
serde = { version = "1.0", features = ["derive"] }
clap = { version = "4.0", features = ["derive"] }
tree-sitter = "0.25.6"
lazy_static = "1.5.0"
reqwest = { version = "0.11", features = ["json"] }
tokio = { version = "1.0", features = ["full"] }
serde_json = "1.0"
